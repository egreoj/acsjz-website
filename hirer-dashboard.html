<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beehire - Hirer Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8fafc;
      margin: 0;
      padding: 0;
      color: #333;
    }
    header {
      background: #FFD700;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15);
    }
    header h1 { margin: 0; color: #222; font-size: 26px; }
    .dashboard {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 25px;
      max-width: 1600px;
      margin: 30px auto;
      padding: 0 20px;
    }
    /* Sidebar Filters */
    .sidebar {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      height: fit-content;
    }
    .sidebar h3 {
      margin-top: 0;
      font-size: 18px;
      color: #444;
      border-bottom: 2px solid #FFD700;
      padding-bottom: 8px;
    }
    .filter-group { margin: 15px 0; }
    .filter-group label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }
    .filter-group input, 
    .filter-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 0.95em;
    }
    .category-buttons button {
      margin: 5px 5px 0 0;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9em;
      background: #f4f4f4;
    }
    .category-buttons button.active {
      background: #FFD700;
      font-weight: bold;
    }
    /* Worker List */
    .worker-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .worker-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      text-align: center;
      position: relative;
      transition: transform 0.2s ease;
    }
    .worker-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 5px 12px rgba(0,0,0,0.15);
    }
    .worker-card img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #FFD700;
      object-fit: cover;
      margin-bottom: 10px;
    }
    .status-dot {
      width: 14px;
      height: 14px;
      background: #28a745;
      border: 2px solid white;
      border-radius: 50%;
      position: absolute;
      top: 18px;
      right: 18px;
    }
    .worker-card h3 {
      margin: 8px 0 4px;
      font-size: 18px;
    }
    .worker-card p {
      margin: 3px 0;
      font-size: 0.95em;
    }
    .verified {
      background: #28a745;
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8em;
      display: inline-block;
      margin-top: 6px;
    }
    .rating {
      color: #ffb400;
      font-size: 1.1em;
      margin-top: 4px;
    }
    .view-btn {
      background: #FFD700;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      margin-top: 12px;
      cursor: pointer;
    }
    .view-btn:hover { background: #e6c200; }
    .muted { color:#6b7280; font-size:.95em; }
  </style>
</head>
<body>
  <header>
    <h1>🐝 Beehire Hirer Dashboard</h1>
  </header>

  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Filters</h3>

      <div class="filter-group">
        <label>Search Skill</label>
        <input type="text" id="searchSkill" placeholder="e.g. Electrician">
      </div>

      <div class="filter-group">
        <label>Verification</label>
        <select id="filterVerified">
          <option value="all">All Workers</option>
          <option value="verified">Verified Only</option>
          <option value="unverified">Unverified Only</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Location</label>
        <select id="filterLocation">
          <option value="all">All</option>
          <option value="iloilo">Iloilo City</option>
          <option value="cebu">Cebu City</option>
          <option value="manila">Manila</option>
          <option value="bacolod">Bacolod</option>
          <option value="davao">Davao</option>
          <option value="cdo">Cagayan de Oro</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Availability</label>
        <input type="checkbox" id="filterAvailable"> Available Now
      </div>

      <div class="filter-group category-buttons">
        <label>Categories</label>
        <button onclick="setCategory('Electrician')">Electrician</button>
        <button onclick="setCategory('Plumber')">Plumber</button>
        <button onclick="setCategory('Tutor')">Tutor</button>
        <button onclick="setCategory('Mechanic')">Mechanic</button>
        <button onclick="setCategory('Carpenter')">Carpenter</button>
        <button onclick="setCategory('Driver')">Driver</button>
        <button onclick="setCategory('Cook')">Cook</button>
        <button onclick="setCategory('IT Support')">IT Support</button>
      </div>

      <div class="filter-group">
        <label>Rate Range</label>
        <select id="filterRate">
          <option value="all">Any</option>
          <option value="low">₱100–₱300</option>
          <option value="mid">₱301–₱500</option>
          <option value="high">₱501+</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Experience</label>
        <select id="filterExperience">
          <option value="all">Any</option>
          <option value="0-1">0–1 yr</option>
          <option value="2-5">2–5 yrs</option>
          <option value="5+">5+ yrs</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Rating</label>
        <select id="filterRating">
          <option value="all">Any</option>
          <option value="4">4★ & above</option>
          <option value="3">3★ & above</option>
        </select>
      </div>
    </aside>

    <!-- Worker Cards -->
    <section class="worker-list" id="workerList">
      <p class="muted" id="loadingState">Loading workers…</p>
    </section>
  </div>

  <!-- Firebase + App Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDocsFromCache } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkkVvflDza_lmFmUmsgUQv6iOiMW3y9bc",
      authDomain: "myapp-96865.firebaseapp.com",
      projectId: "myapp-96865",
      storageBucket: "myapp-96865.appspot.com",
      messagingSenderId: "217431866794",
      appId: "1:217431866794:web:965d02cc01d12ae555ffd3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const workerList = document.getElementById("workerList");
    const loadingState = document.getElementById("loadingState");

    // Filters
    const searchSkill = document.getElementById("searchSkill");
    const filterVerified = document.getElementById("filterVerified");
    const filterLocation = document.getElementById("filterLocation");
    const filterRate = document.getElementById("filterRate");
    const filterExperience = document.getElementById("filterExperience");
    const filterRating = document.getElementById("filterRating");
    const filterAvailable = document.getElementById("filterAvailable");

    // Helpers
    const toHttps = (u)=>!u ? "" : (u.startsWith("http://") ? u.replace("http://","https://") : u);
    const rateNum = (v)=> {
      if (v === null || v === undefined) return null;
      if (typeof v === "number") return v;
      const m = String(v).replace(/[^\d.]/g, "");
      return m ? parseFloat(m) : null;
    };
    const titleCase = (s)=> s ? s.charAt(0).toUpperCase() + s.slice(1) : "";

    let ALL_WORKERS = [];

    function makeCard(w){
      const card = document.createElement("div");
      card.className = "worker-card";
      card.dataset.skill = w.skill || "";
      card.dataset.verified = String(w.verified);
      card.dataset.location = (w.locationKey || "all");
      card.dataset.rate = w.rate ?? "";
      card.dataset.exp = w.exp ?? "";
      card.dataset.rating = w.rating ?? "";
      card.dataset.available = String(w.available);

      card.innerHTML = `
        ${w.available ? '<div class="status-dot"></div>' : ''}
        <img src="${w.photo}" alt="${w.name}">
        <h3>${w.name}</h3>
        <p>${w.skill} • ${w.locationLabel}</p>
        <p>Rate: ${w.rate != null ? `₱${w.rate}/hr` : '—'}</p>
        <div class="rating">${renderStars(w.rating)}</div>
        ${w.verified ? '<span class="verified">✔ Verified</span>' : ''}
        <button class="view-btn" data-uid="${w.uid}">View Profile</button>
      `;
      return card;
    }

    function renderStars(r){
      if (r == null || isNaN(r)) return "☆☆☆☆☆";
      const filled = Math.round(Math.max(0, Math.min(5, r)));
      return "⭐".repeat(filled) + "☆".repeat(5 - filled);
    }

    function normalizeWorker(uid, d){
      const name = d.fullName || d.name || d.username || "Worker";
      const skill = d.skillCategory || (Array.isArray(d.skills) && d.skills.length ? d.skills[0] : "Skill");
      const locationLabel = d.location || "Unknown";
      const locationKey = locationLabel.toLowerCase().includes("iloilo") ? "iloilo"
                        : locationLabel.toLowerCase().includes("cebu") ? "cebu"
                        : locationLabel.toLowerCase().includes("manila") ? "manila"
                        : locationLabel.toLowerCase().includes("bacolod") ? "bacolod"
                        : locationLabel.toLowerCase().includes("davao") ? "davao"
                        : locationLabel.toLowerCase().includes("cagayan") ? "cdo"
                        : "other";

      const rate = rateNum(d.pricing);
      const exp = typeof d.experience === "number" ? d.experience : null;
      const rating = typeof d.rating === "number" ? d.rating : null;
      const photosrc = toHttps(d.profileImageUrl || d.photoUrl) || "https://via.placeholder.com/100";
      const available = d.online === true || String(d.availability || "").toLowerCase().includes("available");
      const docsCount = Array.isArray(d.documents) ? d.documents.filter(x=>x && x.url).length : 0;
      const verified = d.verified === true || docsCount >= 5;

      return {
        uid,
        name,
        photo: photosrc,
        skill,
        locationLabel: titleCase(locationLabel),
        locationKey,
        rate,
        exp,
        rating,
        verified,
        available
      };
    }

    function renderList(items){
      workerList.innerHTML = "";
      if (!items.length){
        workerList.innerHTML = `<p class="muted">No workers match your filters.</p>`;
        return;
      }
      const frag = document.createDocumentFragment();
      items.forEach(w => frag.appendChild(makeCard(w)));
      workerList.appendChild(frag);

      // Bind "View Profile"
      // Bind "View Profile"
workerList.querySelectorAll(".view-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const uid = btn.getAttribute("data-uid");
    if (uid) {
      window.location.href = `Profile_hirer_view.html?uid=${encodeURIComponent(uid)}`;
    }
  });
});

    }

    function applyFilters(){
      const skillValue = searchSkill.value.trim().toLowerCase();
      const verifiedValue = filterVerified.value;      // all | verified | unverified
      const locationValue = filterLocation.value;      // all | iloilo | ...
      const rateValue = filterRate.value;              // all | low | mid | high
      const expValue = filterExperience.value;         // all | 0-1 | 2-5 | 5+
      const ratingValue = filterRating.value;          // all | 4 | 3
      const availableValue = filterAvailable.checked;  // true | false

      const filtered = ALL_WORKERS.filter(w=>{
        if (skillValue && !String(w.skill).toLowerCase().includes(skillValue)) return false;

        if (verifiedValue !== "all"){
          if (verifiedValue === "verified" && !w.verified) return false;
          if (verifiedValue === "unverified" && w.verified) return false;
        }

        if (locationValue !== "all" && w.locationKey !== locationValue) return false;

        if (rateValue === "low"  && !(w.rate != null && w.rate <= 300)) return false;
        if (rateValue === "mid"  && !(w.rate != null && w.rate >= 301 && w.rate <= 500)) return false;
        if (rateValue === "high" && !(w.rate != null && w.rate >= 501)) return false;

        if (expValue === "0-1" && !(w.exp != null && w.exp <= 1)) return false;
        if (expValue === "2-5" && !(w.exp != null && w.exp >= 2 && w.exp <= 5)) return false;
        if (expValue === "5+"  && !(w.exp != null && w.exp >= 5)) return false;

        if (ratingValue !== "all" && !(w.rating != null && w.rating >= parseFloat(ratingValue))) return false;

        if (availableValue && !w.available) return false;

        return true;
      });

      renderList(filtered);
    }

    // Category quick set
    window.setCategory = function(cat){
      searchSkill.value = cat;
      applyFilters();
    };

    // Listeners
    searchSkill.addEventListener("input", applyFilters);
    filterVerified.addEventListener("change", applyFilters);
    filterLocation.addEventListener("change", applyFilters);
    filterRate.addEventListener("change", applyFilters);
    filterExperience.addEventListener("change", applyFilters);
    filterRating.addEventListener("change", applyFilters);
    filterAvailable.addEventListener("change", applyFilters);

    // Fetch workers from Firestore
    (async function init(){
      try{
        const snap = await getDocs(collection(db, "workers"));
        ALL_WORKERS = snap.docs.map(d => normalizeWorker(d.id, d.data()));
        loadingState?.remove();
        renderList(ALL_WORKERS);
      }catch(err){
        console.error("Failed to load workers:", err);
        if (loadingState) loadingState.textContent = "Failed to load workers.";
      }
    })();
  </script>
</body>
</html>
